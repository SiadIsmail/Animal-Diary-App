<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Felova — Redesign Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ————————————————————————— Tokens ————————————————————————— */
:root{
  --paper:#F5F1EA;          /* warm porcelain page ground            */
  --paper-deep:#EFEAE1;     /* recessed wells (week strip, ribbon)   */
  --card:#FFFFFF;           /* primary card surface                  */
  --cream:#FBF7EF;          /* journal / note surface                */
  --line:#E7E0D4;           /* hairline borders                      */
  --ink:#2C2337;            /* primary text — deep plum-ink          */
  --ink-2:#6C6279;          /* secondary text                        */
  --ink-3:#A69DB2;          /* tertiary / metadata                   */
  --viola:#7657B8;          /* brand accent — matured from #9B6FCC   */
  --viola-deep:#5C4197;
  --viola-tint:#F0EBF9;
  --viola-line:#DCD2EE;
  --honey:#D99A3E;          /* medication / attention                */
  --honey-tint:#F9EEDB;
  --honey-deep:#8A5D14;
  --sage:#5F9E82;           /* stable / given / good                 */
  --sage-tint:#E5F0EA;
  --sage-deep:#2E6B50;
  --clay:#C05F5F;           /* alerts, used sparingly                */
  --clay-tint:#F7E5E2;
  --m-great:#4FA085; --m-good:#8CB56E; --m-okay:#DFB253; --m-low:#D68D62; --m-unwell:#C05F5F;
  --shadow-card:0 1px 2px rgba(44,35,55,.05),0 6px 18px rgba(44,35,55,.06);
  --shadow-float:0 10px 30px rgba(44,35,55,.16);
  --r-lg:22px; --r-md:16px; --r-sm:12px;
  --sans:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
  --serif:'Fraunces',Georgia,serif;
  --dur:.34s; --ease:cubic-bezier(.32,.72,.28,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--sans);color:var(--ink);background:#DAD3C6;
  display:flex;align-items:center;justify-content:center;min-height:100vh;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{
  outline:2px solid var(--viola);outline-offset:2px;border-radius:6px;
}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}

/* ————————————————————————— Phone frame ————————————————————————— */
.phone{
  position:relative;width:100%;max-width:402px;height:100vh;max-height:874px;
  background:var(--paper);overflow:hidden;display:flex;flex-direction:column;
}
@media(min-width:480px){
  .phone{border-radius:44px;box-shadow:0 40px 90px rgba(30,22,44,.35),0 0 0 10px #241E2E;height:92vh}
}
/* soft ambient wash — quiet identity, replaces the bubble background */
.phone::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(60% 34% at 18% -4%, rgba(118,87,184,.10), transparent 68%),
    radial-gradient(52% 30% at 96% 8%, rgba(217,154,62,.09), transparent 70%);
}
main{flex:1;position:relative;z-index:1;overflow:hidden}
.screen{
  position:absolute;inset:0;overflow-y:auto;overscroll-behavior:contain;
  padding:26px 22px 118px;display:none;scrollbar-width:none;
}
.screen::-webkit-scrollbar{display:none}
.screen.active{display:block;animation:screenIn var(--dur) var(--ease)}
@keyframes screenIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.screen.subpage.active{animation:subIn var(--dur) var(--ease)}
@keyframes subIn{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}

/* ————————————————————————— Shared primitives ————————————————————————— */
.eyebrow{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
.section-label{font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-2);margin:30px 2px 12px}
.section-label:first-of-type{margin-top:26px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-card)}
.icon-btn{
  width:38px;height:38px;border-radius:50%;display:grid;place-items:center;
  background:var(--card);border:1px solid var(--line);color:var(--ink-2);
  transition:transform .18s var(--ease), background .18s;
}
.icon-btn:active{transform:scale(.92)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-weight:700;font-size:14px;border-radius:14px;padding:12px 18px;
  transition:transform .18s var(--ease), box-shadow .18s, background .18s;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--viola);color:#fff;box-shadow:0 6px 16px rgba(118,87,184,.32)}
.btn-primary:hover{background:var(--viola-deep)}
.btn-ghost{background:var(--viola-tint);color:var(--viola-deep)}
.btn-quiet{background:transparent;border:1px solid var(--line);color:var(--ink-2)}
.chip{
  display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
  padding:4px 10px;border-radius:999px;white-space:nowrap;
}
.chip-neutral{background:var(--paper-deep);color:var(--ink-2)}
.chip-viola{background:var(--viola-tint);color:var(--viola-deep)}
.chip-honey{background:var(--honey-tint);color:var(--honey-deep)}
.chip-sage{background:var(--sage-tint);color:var(--sage-deep)}
.chip-clay{background:var(--clay-tint);color:#8F3B3B}
.divider{height:1px;background:var(--line);margin:0 -2px}

/* header row */
.head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.head h1{font-family:var(--serif);font-weight:550;font-size:27px;letter-spacing:-.01em;line-height:1.1;margin-top:4px}
.head .eyebrow{display:block;margin-bottom:2px}

/* ————————————————————————— TODAY ————————————————————————— */
.hero{display:flex;flex-direction:column;align-items:center;text-align:center;margin:22px 0 8px}
.ringwrap{position:relative;width:126px;height:126px}
.ringwrap svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-bg{stroke:var(--paper-deep)}
.ring-fg{stroke:var(--sage);stroke-linecap:round;transition:stroke-dashoffset 1.1s var(--ease), stroke .3s}
.avatar{
  position:absolute;inset:11px;border-radius:50%;display:grid;place-items:center;
  background:linear-gradient(160deg,#EFE9F8,#E3D9F2);color:var(--viola-deep);
  font-family:var(--serif);font-size:44px;font-weight:500;font-style:italic;
  border:1px solid var(--viola-line);
}
.avatar.small{position:static;inset:auto}
.ring-note{
  position:absolute;bottom:-2px;right:-2px;background:var(--card);border:1px solid var(--line);
  border-radius:999px;font-size:11px;font-weight:800;color:var(--sage-deep);
  padding:3px 9px;box-shadow:var(--shadow-card);
}
.hero h2{font-family:var(--serif);font-weight:560;font-size:33px;letter-spacing:-.015em;margin:14px 0 3px}
.hero .meta{font-size:13.5px;color:var(--ink-2);font-weight:500}
.hero .tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.hero .status{margin-top:12px;font-size:13px;color:var(--ink-3);font-weight:600}
.hero .status b{color:var(--sage-deep);font-weight:800}

/* next-up medication card */
.nextup{display:flex;align-items:center;gap:14px;padding:15px 16px;margin-top:20px}
.nextup .pillbox{
  width:44px;height:44px;border-radius:14px;background:var(--honey-tint);
  display:grid;place-items:center;color:var(--honey-deep);flex-shrink:0;
}
.nextup .info{flex:1;min-width:0}
.nextup .info .t{font-weight:800;font-size:14.5px}
.nextup .info .s{font-size:12.5px;color:var(--ink-2);margin-top:2px}
.nextup .give{padding:9px 14px;font-size:13px;border-radius:12px}
.nextup.done .pillbox{background:var(--sage-tint);color:var(--sage-deep)}

/* stat cards */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.stat{padding:16px 16px 14px;transition:transform .18s var(--ease)}
.stat:active{transform:scale(.98)}
.stat .lab{font-size:10.5px;font-weight:800;letter-spacing:.12em;color:var(--ink-3);text-transform:uppercase}
.stat .val{font-family:var(--serif);font-size:27px;font-weight:560;margin:7px 0 6px;letter-spacing:-.01em}
.stat .val small{font-size:15px;color:var(--ink-2);font-weight:500;font-family:var(--sans)}
.stat .val .mood-dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:7px;vertical-align:2px}

/* mood ribbon */
.ribbon-card{padding:16px}
.ribbon-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.ribbon-head .t{font-weight:800;font-size:13.5px}
.ribbon-head .s{font-size:11.5px;color:var(--ink-3);font-weight:600}
.ribbon{display:flex;gap:3px;align-items:flex-end;height:30px}
.ribbon i{flex:1;border-radius:4px;min-width:4px;transition:height .5s var(--ease)}
.ribbon i.empty{background:var(--paper-deep);height:12px}
.ribbon-legend{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.ribbon-legend span{font-size:10.5px;font-weight:700;color:var(--ink-3);display:inline-flex;align-items:center;gap:5px}
.ribbon-legend i{width:8px;height:8px;border-radius:3px;display:inline-block}

/* weight chart */
.chart-card{padding:16px}
.range{display:flex;background:var(--paper-deep);border-radius:999px;padding:3px;gap:2px}
.range button{flex:1;font-size:11.5px;font-weight:800;color:var(--ink-3);padding:6px 0;border-radius:999px;transition:all .2s}
.range button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow-card)}
.chart-meta{display:flex;justify-content:space-between;align-items:center;margin:14px 2px 6px}
.chart-meta .big{font-family:var(--serif);font-size:22px;font-weight:560}
.chart-meta .big small{font-size:13px;font-family:var(--sans);color:var(--ink-2);font-weight:600}
#wchart{width:100%;height:120px;display:block}

/* activity */
.activity{display:flex;flex-direction:column;gap:10px}
.act{display:flex;align-items:center;gap:13px;padding:13px 15px}
.act .ic{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;flex-shrink:0}
.act .info{flex:1;min-width:0}
.act .info .t{font-weight:750;font-size:13.5px}
.act .info .s{font-size:12px;color:var(--ink-2);margin-top:1px}
.act time{font-size:11.5px;font-weight:700;color:var(--ink-3)}

/* ————————————————————————— JOURNAL ————————————————————————— */
.petchips{display:flex;gap:8px;overflow-x:auto;margin:16px -22px 0;padding:2px 22px 6px;scrollbar-width:none}
.petchips::-webkit-scrollbar{display:none}
.petchip{
  display:inline-flex;align-items:center;gap:8px;padding:7px 14px 7px 7px;border-radius:999px;
  background:var(--card);border:1px solid var(--line);font-weight:750;font-size:13px;color:var(--ink-2);
  transition:all .2s var(--ease);white-space:nowrap;flex-shrink:0;
}
.petchip .mini{width:26px;height:26px;border-radius:50%;background:var(--viola-tint);color:var(--viola-deep);display:grid;place-items:center;font-family:var(--serif);font-style:italic;font-size:14px}
.petchip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.petchip.on .mini{background:rgba(255,255,255,.16);color:#fff}

.weekbar{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 12px}
.weekbar .month{font-family:var(--serif);font-size:19px;font-weight:560}
.weekbar .arrows{display:flex;gap:8px}
.weekstrip{
  display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:var(--paper-deep);
  border-radius:18px;padding:6px;
}
.day{
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 8px;border-radius:13px;
  transition:all .18s var(--ease);position:relative;
}
.day .dw{font-size:9.5px;font-weight:800;letter-spacing:.08em;color:var(--ink-3);text-transform:uppercase}
.day .dn{font-size:15px;font-weight:750;color:var(--ink-2)}
.day .dots{display:flex;gap:2.5px;height:4px}
.day .dots i{width:4px;height:4px;border-radius:50%}
.day.sel{background:var(--card);box-shadow:var(--shadow-card)}
.day.sel .dn{color:var(--ink)}
.day.today .dn{color:var(--viola)}
.day.today::after{content:"";position:absolute;top:5px;right:9px;width:5px;height:5px;border-radius:50%;background:var(--viola)}
.day.future{opacity:.38;pointer-events:none}

.datehead{display:flex;align-items:baseline;justify-content:space-between;margin:24px 2px 0}
.datehead .d{font-family:var(--serif);font-size:21px;font-weight:560}
.datehead .rel{font-size:12px;color:var(--ink-3);font-weight:700}

.quicklog{display:flex;gap:9px;margin-top:14px}
.quicklog button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 6px 11px;
  background:var(--card);border:1px dashed var(--viola-line);border-radius:var(--r-md);
  font-size:12px;font-weight:750;color:var(--viola-deep);transition:all .18s var(--ease);
}
.quicklog button:active{transform:scale(.96)}
.quicklog button svg{color:var(--viola)}

.timeline{margin-top:8px;position:relative;padding-left:4px}
.tl-entry{display:flex;gap:13px;position:relative;padding:9px 0}
.tl-rail{width:38px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.tl-ic{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;z-index:1}
.tl-line{flex:1;width:2px;background:var(--line);margin-top:6px;border-radius:2px}
.tl-entry:last-child .tl-line{display:none}
.tl-body{flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:12px 14px;box-shadow:var(--shadow-card);min-width:0}
.tl-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.tl-top .t{font-weight:800;font-size:13.5px}
.tl-top time{font-size:11px;font-weight:700;color:var(--ink-3);white-space:nowrap}
.tl-sub{font-size:12.5px;color:var(--ink-2);margin-top:2px}
.tl-note{
  font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--ink-2);
  background:var(--cream);border-radius:10px;padding:9px 12px;margin-top:9px;line-height:1.45;
}
.tl-entry.pending .tl-body{background:transparent;border-style:dashed;box-shadow:none}
.tl-entry.pending .tl-ic{border:1.5px dashed var(--honey);background:transparent;color:var(--honey-deep)}
.tl-give{margin-top:10px;padding:8px 13px;font-size:12.5px;border-radius:11px}
.empty{
  text-align:center;padding:44px 24px;color:var(--ink-3);
}
.empty .big{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--ink-2);margin-bottom:6px}
.empty .s{font-size:12.5px;font-weight:600}

/* ————————————————————————— CARE ————————————————————————— */
.petcard{padding:18px;margin-bottom:12px;transition:transform .18s var(--ease)}
.petcard .toprow{display:flex;gap:14px;align-items:center}
.petcard .avatar.small{width:56px;height:56px;font-size:26px;flex-shrink:0;border-radius:50%}
.petcard .nm{font-family:var(--serif);font-size:21px;font-weight:560;letter-spacing:-.01em}
.petcard .mt{font-size:12.5px;color:var(--ink-2);font-weight:600;margin-top:1px}
.petcard .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.petcard .actions{display:flex;gap:9px;margin-top:14px}
.petcard .actions .btn{flex:1;padding:10px;font-size:13px}
.petcard.inactive{opacity:.82}
.petcard.inactive .toprow{cursor:pointer}
.manage{display:flex;flex-direction:column;overflow:hidden;padding:4px 0}
.mrow{display:flex;align-items:center;gap:14px;padding:15px 18px;transition:background .15s;text-align:left;width:100%}
.mrow:active{background:var(--paper-deep)}
.mrow .ic{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;flex-shrink:0}
.mrow .info{flex:1}
.mrow .info .t{font-weight:800;font-size:14px}
.mrow .info .s{font-size:12px;color:var(--ink-2);margin-top:1px}
.mrow .count{font-size:12px;font-weight:800;color:var(--viola-deep);background:var(--viola-tint);padding:3px 9px;border-radius:999px}
.mrow + .mrow{border-top:1px solid var(--line)}
.addpet{width:100%;margin-top:12px;padding:14px;border:1.5px dashed var(--viola-line);border-radius:var(--r-md);color:var(--viola-deep);font-weight:750;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s}
.addpet:active{background:var(--viola-tint)}

/* ————————————————————————— MEDICATIONS ————————————————————————— */
.subhead{display:grid;grid-template-columns:38px 1fr 38px;align-items:center;gap:10px;margin-bottom:20px}
.subhead h1{font-family:var(--serif);font-size:21px;font-weight:560;text-align:center}
.seg{display:flex;background:var(--paper-deep);border-radius:999px;padding:4px;gap:3px;margin-bottom:8px}
.seg button{flex:1;font-size:13px;font-weight:800;color:var(--ink-3);padding:9px 0;border-radius:999px;transition:all .2s}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow-card)}
.medlist{display:flex;flex-direction:column;gap:11px}
.med{padding:15px 16px;display:flex;gap:13px;align-items:flex-start}
.med .pillbox{width:42px;height:42px;border-radius:13px;background:var(--viola-tint);color:var(--viola-deep);display:grid;place-items:center;flex-shrink:0}
.med .body{flex:1;min-width:0}
.med .nm{font-weight:800;font-size:15px}
.med .ds{font-size:12.5px;color:var(--ink-2);font-weight:600;margin-top:1px}
.med .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.med .foot{font-size:11.5px;color:var(--ink-3);font-weight:600;margin-top:9px}
.med .side{display:flex;flex-direction:column;gap:8px}
.med .side .icon-btn{width:33px;height:33px}
.med.archived{opacity:.68}
.med.archived .pillbox{background:var(--paper-deep);color:var(--ink-3)}
.stickyadd{position:sticky;bottom:0;padding:14px 0 4px;background:linear-gradient(transparent,var(--paper) 38%)}
.stickyadd .btn{width:100%;padding:15px;font-size:15px;border-radius:16px}

/* ————————————————————————— TAB BAR ————————————————————————— */
.tabbar{
  position:absolute;left:16px;right:16px;bottom:16px;z-index:30;
  background:rgba(255,255,255,.86);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow-float);
  display:grid;grid-template-columns:repeat(3,1fr);padding:7px;
}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 7px;
  border-radius:17px;color:var(--ink-3);font-size:10.5px;font-weight:800;letter-spacing:.02em;
  transition:all .22s var(--ease);
}
.tab.on{color:var(--viola-deep);background:var(--viola-tint)}
.tab:active{transform:scale(.95)}

/* ————————————————————————— SHEETS ————————————————————————— */
.scrim{
  position:absolute;inset:0;background:rgba(37,28,50,.42);z-index:40;opacity:0;
  pointer-events:none;transition:opacity .3s;
}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{
  position:absolute;left:0;right:0;bottom:0;z-index:50;background:var(--paper);
  border-radius:28px 28px 0 0;padding:10px 22px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(105%);transition:transform .42s var(--ease);
  box-shadow:0 -14px 44px rgba(30,22,44,.24);max-height:86%;overflow-y:auto;
}
.sheet.show{transform:translateY(0)}
.handle{width:38px;height:4px;border-radius:99px;background:var(--line);margin:4px auto 16px}
.sheet h3{font-family:var(--serif);font-size:21px;font-weight:560;text-align:center;margin-bottom:4px}
.sheet .sub{text-align:center;font-size:12.5px;color:var(--ink-3);font-weight:600;margin-bottom:20px}
.moodgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.moodopt{
  display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 2px 11px;
  border-radius:15px;background:var(--card);border:1.5px solid var(--line);
  font-size:10.5px;font-weight:800;color:var(--ink-2);transition:all .18s var(--ease);
}
.moodopt .swatch{width:26px;height:26px;border-radius:50%;transition:transform .18s var(--ease)}
.moodopt.on{border-color:var(--ink);background:var(--card);transform:translateY(-2px);box-shadow:var(--shadow-card)}
.moodopt.on .swatch{transform:scale(1.18)}
.field{margin-top:16px}
.field label{display:block;font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2);margin-bottom:7px}
.field input[type=text],.field input[type=number],.field select,.field textarea,.field input[type=time]{
  width:100%;background:var(--card);border:1px solid var(--line);border-radius:13px;
  padding:13px 14px;font-weight:600;transition:border-color .2s;appearance:none;
}
.field textarea{resize:none;min-height:74px;font-family:var(--serif);font-style:italic;font-size:14.5px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--viola);outline:none}
.field .row{display:flex;gap:10px}
.sheet .actions{display:flex;gap:10px;margin-top:24px}
.sheet .actions .btn{flex:1;padding:15px;font-size:15px;border-radius:15px}
.stepper{display:flex;align-items:center;gap:12px}
.stepper button{
  width:46px;height:46px;border-radius:14px;background:var(--card);border:1px solid var(--line);
  font-size:22px;font-weight:600;color:var(--viola-deep);flex-shrink:0;transition:transform .15s;
}
.stepper button:active{transform:scale(.92)}
.stepper input{text-align:center;font-family:var(--serif);font-size:24px !important;font-weight:560}
.medlog-row{
  display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
  border-radius:15px;padding:13px 15px;margin-bottom:9px;width:100%;text-align:left;transition:all .18s;
}
.medlog-row .cb{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;
  display:grid;place-items:center;color:#fff;transition:all .2s;
}
.medlog-row.given{border-color:var(--sage-tint);background:var(--sage-tint)}
.medlog-row.given .cb{background:var(--sage);border-color:var(--sage)}
.medlog-row .info{flex:1}
.medlog-row .info .t{font-weight:800;font-size:14px}
.medlog-row .info .s{font-size:12px;color:var(--ink-2);margin-top:1px}

/* toast */
.toast{
  position:absolute;left:50%;bottom:104px;transform:translate(-50%,16px);z-index:60;
  background:var(--ink);color:#fff;font-size:13px;font-weight:700;padding:11px 18px;
  border-radius:999px;opacity:0;pointer-events:none;transition:all .34s var(--ease);
  box-shadow:var(--shadow-float);display:flex;align-items:center;gap:8px;white-space:nowrap;
}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast svg{color:var(--sage)}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001s !important;transition-duration:.001s !important}
}
</style>
</head>
<body>
<div class="phone">
  <main>

    <!-- ================= TODAY ================= -->
    <section class="screen active" id="screen-today">
      <div class="head">
        <div>
          <span class="eyebrow" id="today-date"></span>
          <h1 id="greeting">Good morning</h1>
        </div>
        <button class="icon-btn" aria-label="Settings" onclick="toast('Settings — coming soon')" data-ic="gear"></button>
      </div>
      <div id="today-hero"></div>
      <div id="today-nextup"></div>
      <div class="stats" id="today-stats"></div>

      <div class="section-label">Mood · last 30 days</div>
      <div class="card ribbon-card">
        <div class="ribbon" id="ribbon"></div>
        <div class="ribbon-legend">
          <span><i style="background:var(--m-great)"></i>Great</span>
          <span><i style="background:var(--m-good)"></i>Good</span>
          <span><i style="background:var(--m-okay)"></i>Okay</span>
          <span><i style="background:var(--m-low)"></i>Low</span>
          <span><i style="background:var(--m-unwell)"></i>Unwell</span>
        </div>
      </div>

      <div class="section-label">Weight trend</div>
      <div class="card chart-card">
        <div class="range" id="wrange">
          <button data-r="14" >2W</button>
          <button data-r="30" class="on">1M</button>
          <button data-r="90">3M</button>
          <button data-r="365">All</button>
        </div>
        <div class="chart-meta">
          <div class="big" id="wnow"></div>
          <span class="chip chip-sage" id="wtrend"></span>
        </div>
        <svg id="wchart" viewBox="0 0 340 120" preserveAspectRatio="none" aria-label="Weight trend chart"></svg>
      </div>

      <div class="section-label">Recent activity</div>
      <div class="activity" id="today-activity"></div>
    </section>

    <!-- ================= JOURNAL ================= -->
    <section class="screen" id="screen-journal">
      <div class="head">
        <div>
          <span class="eyebrow">Health journal</span>
          <h1>Journal</h1>
        </div>
        <button class="icon-btn" aria-label="Jump to today" onclick="jumpToday()" data-ic="target"></button>
      </div>
      <div class="petchips" id="journal-chips"></div>
      <div class="weekbar">
        <span class="month" id="month-label"></span>
        <div class="arrows">
          <button class="icon-btn" aria-label="Previous week" onclick="shiftWeek(-1)" data-ic="chevL"></button>
          <button class="icon-btn" aria-label="Next week" onclick="shiftWeek(1)" data-ic="chevR"></button>
        </div>
      </div>
      <div class="weekstrip" id="weekstrip"></div>
      <div class="datehead">
        <span class="d" id="sel-date"></span>
        <span class="rel" id="sel-rel"></span>
      </div>
      <div class="quicklog">
        <button onclick="openMoodSheet()"><span data-ic="smile"></span>Mood</button>
        <button onclick="openWeightSheet()"><span data-ic="scale"></span>Weight</button>
        <button onclick="openMedLogSheet()"><span data-ic="pill"></span>Medication</button>
      </div>
      <div class="section-label">Day timeline</div>
      <div class="timeline" id="timeline"></div>
    </section>

    <!-- ================= CARE ================= -->
    <section class="screen" id="screen-care">
      <div class="head">
        <div>
          <span class="eyebrow">Pets &amp; management</span>
          <h1>Care</h1>
        </div>
        <button class="icon-btn" aria-label="Settings" onclick="toast('Settings — coming soon')" data-ic="gear"></button>
      </div>
      <div class="section-label">Your pets</div>
      <div id="care-pets"></div>
      <button class="addpet" onclick="toast('Add a pet — opens the create-pet flow')"><span data-ic="plus"></span>Add a pet</button>
      <div class="section-label">Manage</div>
      <div class="card manage" id="care-manage"></div>
    </section>

    <!-- ================= MEDICATIONS (sub-page) ================= -->
    <section class="screen subpage" id="screen-meds">
      <div class="subhead">
        <button class="icon-btn" aria-label="Back" onclick="showScreen('care')" data-ic="chevL"></button>
        <h1>Medications</h1>
        <span></span>
      </div>
      <div class="seg" id="med-seg">
        <button class="on" data-tab="active">Active</button>
        <button data-tab="archived">Archived</button>
      </div>
      <div class="section-label" id="med-count" style="margin-top:14px"></div>
      <div class="medlist" id="medlist"></div>
      <div class="stickyadd"><button class="btn btn-primary" onclick="openMedForm()"><span data-ic="plus"></span>Add medication</button></div>
    </section>
  </main>

  <!-- ================= TAB BAR ================= -->
  <nav class="tabbar" aria-label="Main navigation">
    <button class="tab on" data-screen="today"><span data-ic="sun"></span>Today</button>
    <button class="tab" data-screen="journal"><span data-ic="book"></span>Journal</button>
    <button class="tab" data-screen="care"><span data-ic="paw"></span>Care</button>
  </nav>

  <!-- ================= SHEETS ================= -->
  <div class="scrim" id="scrim" onclick="closeSheets()"></div>

  <div class="sheet" id="sheet-mood" role="dialog" aria-label="Log mood">
    <div class="handle"></div>
    <h3 id="mood-title">How is Mochi today?</h3>
    <p class="sub" id="mood-sub"></p>
    <div class="moodgrid" id="moodgrid"></div>
    <div class="field">
      <label for="mood-note">Note · optional</label>
      <textarea id="mood-note" placeholder="Ate well this morning, more playful than yesterday…"></textarea>
    </div>
    <div class="actions">
      <button class="btn btn-quiet" onclick="closeSheets()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMood()">Save mood</button>
    </div>
  </div>

  <div class="sheet" id="sheet-weight" role="dialog" aria-label="Log weight">
    <div class="handle"></div>
    <h3 id="weight-title">Log weight</h3>
    <p class="sub" id="weight-sub"></p>
    <div class="field">
      <label for="weight-input">Weight · kilograms</label>
      <div class="stepper">
        <button aria-label="Decrease" onclick="stepWeight(-0.1)">−</button>
        <input type="number" id="weight-input" step="0.1" min="0" inputmode="decimal">
        <button aria-label="Increase" onclick="stepWeight(0.1)">+</button>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-quiet" onclick="closeSheets()">Cancel</button>
      <button class="btn btn-primary" onclick="saveWeight()">Save weight</button>
    </div>
  </div>

  <div class="sheet" id="sheet-medlog" role="dialog" aria-label="Log medication">
    <div class="handle"></div>
    <h3>Medications</h3>
    <p class="sub" id="medlog-sub"></p>
    <div id="medlog-list"></div>
    <div class="actions">
      <button class="btn btn-quiet" onclick="closeSheets()">Done</button>
    </div>
  </div>

  <div class="sheet" id="sheet-medform" role="dialog" aria-label="Add or edit medication">
    <div class="handle"></div>
    <h3 id="medform-title">Add medication</h3>
    <p class="sub">Schedules power reminders and the day timeline</p>
    <div class="field">
      <label for="mf-name">Medication name</label>
      <input type="text" id="mf-name" placeholder="e.g. Methimazole">
    </div>
    <div class="field">
      <label>Dose &amp; unit</label>
      <div class="row">
        <input type="number" id="mf-dose" placeholder="2.5" step="0.1" style="flex:1.4" inputmode="decimal">
        <select id="mf-unit" style="flex:1">
          <option>mg</option><option>ml</option><option>tablet</option><option>drops</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="mf-freq">Frequency</label>
      <select id="mf-freq">
        <option>Once daily</option><option>Twice daily</option><option>Three times daily</option>
        <option>Every other day</option><option>Weekly</option><option>As needed</option>
      </select>
    </div>
    <div class="field">
      <label>Time(s)</label>
      <div class="row">
        <input type="time" id="mf-t1" value="08:00" style="flex:1">
        <input type="time" id="mf-t2" value="20:00" style="flex:1">
      </div>
    </div>
    <div class="field">
      <label for="mf-pet">For pet</label>
      <select id="mf-pet"></select>
    </div>
    <div class="field">
      <label for="mf-notes">Notes · optional</label>
      <input type="text" id="mf-notes" placeholder="e.g. with food, after meal…">
    </div>
    <div class="actions">
      <button class="btn btn-quiet" onclick="closeSheets()">Cancel</button>
      <button class="btn btn-primary" id="mf-save" onclick="saveMedForm()">Add medication</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
/* ————————————————————————— Icons ————————————————————————— */
const ICONS = {
  gear:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.65 8.9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.08A1.7 1.7 0 0 0 10.12 3V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.08c.26.63.87 1.04 1.56 1.03H21a2 2 0 1 1 0 4h-.09c-.68 0-1.3.41-1.51 1.05z"/></svg>',
  sun:'<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.3 4.3l1.7 1.7M18 18l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.3 19.7 6 18M18 6l1.7-1.7"/></svg>',
  book:'<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V4a1.5 1.5 0 0 0-1.5-1.5H6.5A2.5 2.5 0 0 0 4 5v14.5z"/><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20v-5"/><path d="M9 7.5h7M9 11h4.5"/></svg>',
  paw:'<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="6" cy="9.5" rx="1.9" ry="2.5"/><ellipse cx="18" cy="9.5" rx="1.9" ry="2.5"/><ellipse cx="9.6" cy="5.8" rx="1.9" ry="2.6"/><ellipse cx="14.4" cy="5.8" rx="1.9" ry="2.6"/><path d="M12 11.2c-2.6 0-5.2 2.5-5.2 5.1 0 1.7 1.3 2.9 2.9 2.9 1 0 1.6-.4 2.3-.4s1.3.4 2.3.4c1.6 0 2.9-1.2 2.9-2.9 0-2.6-2.6-5.1-5.2-5.1z"/></svg>',
  pill:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3.2" y="9" width="17.6" height="6.4" rx="3.2" transform="rotate(-40 12 12)"/><path d="M9.2 8.2l5.6 6.6"/></svg>',
  scale:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="4.5"/><path d="M8 9.5a5.5 5.5 0 0 1 8 0l-2.4 2.3a2.2 2.2 0 0 0-3.2 0z"/></svg>',
  smile:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M8.6 14.2s1.2 1.7 3.4 1.7 3.4-1.7 3.4-1.7"/><path d="M9.3 9.6h.01M14.7 9.6h.01"/></svg>',
  note:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
  doc:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2.5H6.5A1.5 1.5 0 0 0 5 4v16a1.5 1.5 0 0 0 1.5 1.5h11A1.5 1.5 0 0 0 19 20V7.5z"/><path d="M14 2.5V7.5H19M8.5 12h7M8.5 15.5h5"/></svg>',
  export:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3.5M7.5 8 12 3.5 16.5 8"/><path d="M4.5 14.5v4A2.5 2.5 0 0 0 7 21h10a2.5 2.5 0 0 0 2.5-2.5v-4"/></svg>',
  plus:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  check:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  chevL:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m14.5 6-6 6 6 6"/></svg>',
  chevR:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9.5 6 6 6-6 6"/></svg>',
  chev:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9.5 6 6 6-6 6"/></svg>',
  edit:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
  archive:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4.5" rx="1"/><path d="M5 8.5V19a1.5 1.5 0 0 0 1.5 1.5h11A1.5 1.5 0 0 0 19 19V8.5M10 12.5h4"/></svg>',
  restore:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4.5V9h4.5"/></svg>',
  target:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22"/></svg>',
};
document.querySelectorAll('[data-ic]').forEach(el=>{el.innerHTML=ICONS[el.dataset.ic]||''});

/* ————————————————————————— Data ————————————————————————— */
const TODAY = new Date(2026,6,2); // Thu 2 Jul 2026 (prototype clock)
const iso = d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const MOODS={
  great:{label:'Great',color:'var(--m-great)'},
  good:{label:'Good',color:'var(--m-good)'},
  okay:{label:'Okay',color:'var(--m-okay)'},
  low:{label:'Low',color:'var(--m-low)'},
  unwell:{label:'Unwell',color:'var(--m-unwell)'},
};

const state={
  activePet:'p1',
  selectedDate:new Date(TODAY),
  medTab:'active',
  chartRange:30,
  editingMed:null,
  pets:[
    {id:'p1',name:'Mochi',type:'Cat',age:7,conditions:['Kidney · Stage 1']},
    {id:'p2',name:'Biscuit',type:'Dog',age:3,conditions:[]},
  ],
  meds:[
    {id:'m1',petId:'p1',name:'Methimazole',dose:2.5,unit:'mg',frequency:'Twice daily',times:['08:00','20:00'],notes:'with food',archived:false},
    {id:'m2',petId:'p1',name:'Renal support',dose:1,unit:'tablet',frequency:'Once daily',times:['08:00'],notes:'',archived:false},
    {id:'m3',petId:'p1',name:'Mirtazapine',dose:2,unit:'mg',frequency:'Every other day',times:['09:00'],notes:'appetite support',archived:true},
  ],
  entries:{}, // key `${petId}|${iso}` → {mood:{preset,note,at}, weight:{kg,at}, given:{medId:[times]}}
};

/* seed 40 days of believable history for Mochi + light history for Biscuit */
(function seed(){
  const moodSeq=['okay','good','good','great','good','okay','low','okay','good','good',
                 'great','good','good','okay','good','low','unwell','low','okay','good',
                 'good','great','good','good','okay','good','good','great','good','good'];
  let w=4.32;
  for(let i=29;i>=0;i--){
    const d=addDays(TODAY,-i), k=`p1|${iso(d)}`;
    const e=state.entries[k]={};
    e.mood={preset:moodSeq[29-i],note:'',at:'09:10'};
    w += (Math.sin(i*1.7)*0.018) - 0.006;
    if(i%2===0||i<5) e.weight={kg:Math.round(w*100)/100,at:'08:15'};
    e.given={m1:i>0?['08:00','20:00']:['08:02'],m2:['08:05']};
    if(i%2===0&&i>0) e.given.m3=['09:00'];
  }
  const t=state.entries[`p1|${iso(TODAY)}`];
  t.mood={preset:'good',note:'Ate the whole breakfast portion and asked for more. Sat in the sun by the window most of the morning.',at:'09:15'};
  t.weight={kg:4.1,at:'08:10'};
  // Biscuit: sparse
  [6,3,1].forEach(i=>{
    const k=`p2|${iso(addDays(TODAY,-i))}`;
    state.entries[k]={mood:{preset:'great',note:'',at:'10:00'},given:{}};
  });
})();

const pet=()=>state.pets.find(p=>p.id===state.activePet);
const entry=(pid,d)=>state.entries[`${pid}|${iso(d)}`]||null;
const ensureEntry=(pid,d)=>{const k=`${pid}|${iso(d)}`;return state.entries[k]??(state.entries[k]={})};
const petMeds=pid=>state.meds.filter(m=>m.petId===pid&&!m.archived);
const nowHM=()=>'20:00'>timeStr()?timeStr():timeStr(); // placeholder
function timeStr(){const n=new Date();return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`}

/* ————————————————————————— Utility ————————————————————————— */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function fmtLong(d){return `${DOW[(d.getDay()+6)%7]}, ${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`}
function relLabel(d){
  const diff=Math.round((new Date(iso(TODAY))-new Date(iso(d)))/864e5);
  return diff===0?'Today':diff===1?'Yesterday':diff>1?`${diff} days ago`:'Upcoming';
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=ICONS.check+esc(msg);
  t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ————————————————————————— Navigation ————————————————————————— */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  const hl=name==='meds'?'care':name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.screen===hl));
  if(name==='today')renderToday();
  if(name==='journal')renderJournal();
  if(name==='care')renderCare();
  if(name==='meds')renderMeds();
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>showScreen(t.dataset.screen)));

/* ————————————————————————— TODAY ————————————————————————— */
function careTasks(pid,d){
  const e=entry(pid,d)||{};
  const doses=[]; petMeds(pid).forEach(m=>m.times.forEach(t=>doses.push({med:m,time:t})));
  const given=e.given||{};
  let done=0;
  petMeds(pid).forEach(m=>{done+=Math.min((given[m.id]||[]).length,m.times.length)});
  const total=doses.length+2;
  done += (e.mood?1:0)+(e.weight?1:0);
  const pending=doses.filter(x=>{
    const g=(given[x.med.id]||[]).length;
    return x.med.times.indexOf(x.time) >= g;
  }).sort((a,b)=>a.time<b.time?-1:1);
  return {done,total,pending};
}
function renderToday(){
  const p=pet(), d=TODAY, e=entry(p.id,d)||{};
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('today-date').textContent=`${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
  const h=new Date().getHours();
  document.getElementById('greeting').textContent=h<12?'Good morning':h<18?'Good afternoon':'Good evening';

  const {done,total,pending}=careTasks(p.id,d);
  const frac=total?done/total:0;
  const R=59,C=2*Math.PI*R;
  document.getElementById('today-hero').innerHTML=`
    <div class="hero">
      <div class="ringwrap">
        <svg viewBox="0 0 126 126" fill="none" aria-hidden="true">
          <circle class="ring-bg" cx="63" cy="63" r="${R}" stroke-width="5"/>
          <circle class="ring-fg" cx="63" cy="63" r="${R}" stroke-width="5"
            stroke-dasharray="${C}" stroke-dashoffset="${C}" data-target="${C*(1-frac)}"
            style="stroke:${frac>=1?'var(--sage)':frac>=.5?'var(--sage)':'var(--honey)'}"/>
        </svg>
        <div class="avatar">${p.name[0]}</div>
        <span class="ring-note">${done}/${total}</span>
      </div>
      <h2>${esc(p.name)}</h2>
      <div class="meta">${esc(p.type)} · ${p.age} years</div>
      <div class="tags">
        ${p.conditions.map(c=>`<span class="chip chip-neutral">${esc(c)}</span>`).join('')}
        ${petMeds(p.id).length?`<span class="chip chip-viola">${petMeds(p.id).length} medications</span>`:''}
      </div>
      <div class="status">${done===total?'<b>All care done for today</b> · lovely work':`<b>${done} of ${total}</b> care tasks done today`}</div>
    </div>`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const r=document.querySelector('.ring-fg'); if(r)r.style.strokeDashoffset=r.dataset.target;
  }));

  const nu=document.getElementById('today-nextup');
  if(pending.length){
    const x=pending[0];
    nu.innerHTML=`
      <div class="card nextup">
        <div class="pillbox">${ICONS.pill}</div>
        <div class="info">
          <div class="t">${esc(x.med.name)} · ${x.med.dose}${x.med.unit==='tablet'?' tablet':x.med.unit}</div>
          <div class="s">Next up · due ${x.time}${x.med.notes?` · ${esc(x.med.notes)}`:''}</div>
        </div>
        <button class="btn btn-primary give" onclick="markGiven('${x.med.id}')">Mark given</button>
      </div>`;
  }else{
    nu.innerHTML=`
      <div class="card nextup done">
        <div class="pillbox">${ICONS.check}</div>
        <div class="info">
          <div class="t">All medications given</div>
          <div class="s">Nothing more scheduled today</div>
        </div>
      </div>`;
  }

  const wEntries=weightSeries(p.id,365);
  const latest=wEntries.length?wEntries[wEntries.length-1].kg:null;
  const mood=e.mood?MOODS[e.mood.preset]:null;
  document.getElementById('today-stats').innerHTML=`
    <button class="card stat" style="text-align:left" onclick="toast('Weight history — coming soon')">
      <div class="lab">Weight</div>
      <div class="val">${latest!=null?latest.toFixed(1):'—'} <small>kg</small></div>
      ${trendChip(p.id)}
    </button>
    <button class="card stat" style="text-align:left" onclick="goLog('mood')">
      <div class="lab">Mood</div>
      <div class="val">${mood?`<span class="mood-dot" style="background:${mood.color}"></span>${mood.label}`:'—'}</div>
      <span class="chip ${mood?'chip-sage':'chip-neutral'}">${mood?'Logged today':'Not logged yet'}</span>
    </button>`;

  // ribbon
  const rib=document.getElementById('ribbon');
  let ribHtml='';
  for(let i=29;i>=0;i--){
    const ent=entry(p.id,addDays(TODAY,-i));
    if(ent&&ent.mood){
      const m=MOODS[ent.mood.preset];
      const hgt={great:30,good:26,okay:20,low:15,unwell:11}[ent.mood.preset];
      ribHtml+=`<i style="background:${m.color};height:${hgt}px" title="${m.label}"></i>`;
    }else ribHtml+='<i class="empty"></i>';
  }
  rib.innerHTML=ribHtml;

  drawChart();
  renderActivity();
}
function trendChip(pid){
  const s=weightSeries(pid,32);
  if(s.length<2)return '<span class="chip chip-neutral">Not enough data</span>';
  const diff=s[s.length-1].kg-s[0].kg;
  if(Math.abs(diff)<0.05)return '<span class="chip chip-sage">Stable this month</span>';
  const cls=Math.abs(diff)>0.25?'chip-clay':'chip-honey';
  return `<span class="chip ${cls}">${diff>0?'+':'−'}${Math.abs(diff).toFixed(1)} kg this month</span>`;
}
function weightSeries(pid,days){
  const out=[];
  for(let i=days-1;i>=0;i--){
    const d=addDays(TODAY,-i), e=entry(pid,d);
    if(e&&e.weight)out.push({d,kg:e.weight.kg});
  }
  return out;
}
function drawChart(){
  const p=pet(), s=weightSeries(p.id,state.chartRange);
  const svg=document.getElementById('wchart');
  const now=document.getElementById('wnow'), tr=document.getElementById('wtrend');
  if(s.length<2){svg.innerHTML='';now.innerHTML='—';tr.className='chip chip-neutral';tr.textContent='Not enough data';return}
  const latest=s[s.length-1].kg;
  now.innerHTML=`${latest.toFixed(1)} <small>kg now</small>`;
  const diff=latest-s[0].kg;
  tr.className='chip '+(Math.abs(diff)<0.05?'chip-sage':Math.abs(diff)>0.25?'chip-clay':'chip-honey');
  tr.textContent=Math.abs(diff)<0.05?'Stable':(diff>0?'+':'−')+Math.abs(diff).toFixed(2)+' kg';
  const W=340,H=120,pad=10;
  const min=Math.min(...s.map(x=>x.kg)), max=Math.max(...s.map(x=>x.kg));
  const span=Math.max(max-min,0.2);
  const X=i=>pad+(W-2*pad)*(i/(s.length-1));
  const Y=v=>H-pad-(H-2*pad)*((v-min+ (span-(max-min))/2 )/span);
  let pts=s.map((x,i)=>[X(i),Y(x.kg)]);
  let path=`M${pts[0][0]},${pts[0][1]}`;
  for(let i=1;i<pts.length;i++){
    const [x0,y0]=pts[i-1],[x1,y1]=pts[i],mx=(x0+x1)/2;
    path+=` C${mx},${y0} ${mx},${y1} ${x1},${y1}`;
  }
  const last=pts[pts.length-1];
  svg.innerHTML=`
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7657B8" stop-opacity=".16"/>
      <stop offset="1" stop-color="#7657B8" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${path} L${last[0]},${H} L${pts[0][0]},${H} Z" fill="url(#wg)"/>
    <path d="${path}" fill="none" stroke="#7657B8" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="4.2" fill="#7657B8" stroke="#fff" stroke-width="2"/>`;
}
document.getElementById('wrange').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#wrange button').forEach(x=>x.classList.toggle('on',x===b));
  state.chartRange=+b.dataset.r; drawChart();
});
function renderActivity(){
  const p=pet();
  const items=[];
  for(let i=0;i<3&&items.length<4;i++){
    const d=addDays(TODAY,-i), e=entry(p.id,d); if(!e)continue;
    const dayLbl=i===0?'':i===1?'Yesterday · ':fmtLong(d)+' · ';
    Object.entries(e.given||{}).forEach(([mid,times])=>{
      const m=state.meds.find(x=>x.id===mid); if(!m)return;
      times.slice().reverse().forEach(t=>items.push({ic:'pill',bg:'var(--honey-tint)',fg:'var(--honey-deep)',t:'Medication given',s:`${m.name} · ${m.dose}${m.unit==='tablet'?' tablet':m.unit}${m.notes?' · '+m.notes:''}`,time:dayLbl+t,sort:iso(d)+t}));
    });
    if(e.weight)items.push({ic:'scale',bg:'var(--viola-tint)',fg:'var(--viola-deep)',t:'Weight logged',s:`${e.weight.kg.toFixed(2).replace(/0$/,'')} kg`,time:dayLbl+e.weight.at,sort:iso(d)+e.weight.at});
    if(e.mood)items.push({ic:'smile',bg:'var(--sage-tint)',fg:'var(--sage-deep)',t:`Mood · ${MOODS[e.mood.preset].label}`,s:e.mood.note?e.mood.note.slice(0,52)+(e.mood.note.length>52?'…':''):'No note',time:dayLbl+e.mood.at,sort:iso(d)+e.mood.at});
  }
  items.sort((a,b)=>a.sort<b.sort?1:-1);
  document.getElementById('today-activity').innerHTML=items.slice(0,4).map(x=>`
    <div class="card act">
      <div class="ic" style="background:${x.bg};color:${x.fg}">${ICONS[x.ic]}</div>
      <div class="info"><div class="t">${esc(x.t)}</div><div class="s">${esc(x.s)}</div></div>
      <time>${esc(x.time)}</time>
    </div>`).join('');
}
function goLog(kind){
  state.selectedDate=new Date(TODAY);
  showScreen('journal');
  setTimeout(()=>{kind==='mood'?openMoodSheet():openWeightSheet()},260);
}
function markGiven(medId){
  const e=ensureEntry(state.activePet,TODAY);
  e.given??={}; (e.given[medId]??=[]).push(timeStr());
  const m=state.meds.find(x=>x.id===medId);
  toast(`${m.name} marked as given`);
  renderToday();
}

/* ————————————————————————— JOURNAL ————————————————————————— */
function renderJournal(){
  // pet chips
  document.getElementById('journal-chips').innerHTML=state.pets.map(p=>`
    <button class="petchip ${p.id===state.activePet?'on':''}" onclick="switchPet('${p.id}')">
      <span class="mini">${p.name[0]}</span>${esc(p.name)} · ${p.age} yrs
    </button>`).join('');
  renderWeek();
  renderTimeline();
}
function switchPet(id){state.activePet=id;renderJournal()}
function mondayOf(d){const x=new Date(d);const off=(x.getDay()+6)%7;x.setDate(x.getDate()-off);return x}
function renderWeek(){
  const start=mondayOf(state.selectedDate);
  const end=addDays(start,6);
  const ml=start.getMonth()===end.getMonth()
    ? `${MONTHS[start.getMonth()]} ${start.getFullYear()}`
    : `${MONTHS[start.getMonth()].slice(0,3)} – ${MONTHS[end.getMonth()].slice(0,3)} ${end.getFullYear()}`;
  document.getElementById('month-label').textContent=ml;
  let html='';
  for(let i=0;i<7;i++){
    const d=addDays(start,i), e=entry(state.activePet,d);
    const isSel=iso(d)===iso(state.selectedDate), isToday=iso(d)===iso(TODAY), isFuture=d>TODAY;
    let dots='';
    if(e){
      if(e.mood)dots+=`<i style="background:${MOODS[e.mood.preset].color}"></i>`;
      if(e.weight)dots+='<i style="background:var(--viola)"></i>';
      if(e.given&&Object.keys(e.given).length)dots+='<i style="background:var(--honey)"></i>';
    }
    html+=`<button class="day ${isSel?'sel':''} ${isToday?'today':''} ${isFuture?'future':''}" onclick="selectDate('${iso(d)}')" aria-label="${fmtLong(d)}">
      <span class="dw">${DOW[i].slice(0,2)}</span><span class="dn">${d.getDate()}</span><span class="dots">${dots}</span>
    </button>`;
  }
  document.getElementById('weekstrip').innerHTML=html;
  document.getElementById('sel-date').textContent=fmtLong(state.selectedDate);
  document.getElementById('sel-rel').textContent=relLabel(state.selectedDate);
}
function selectDate(s){const [y,m,d]=s.split('-').map(Number);state.selectedDate=new Date(y,m-1,d);renderWeek();renderTimeline()}
function shiftWeek(n){state.selectedDate=addDays(state.selectedDate,7*n);if(state.selectedDate>TODAY)state.selectedDate=new Date(TODAY);renderJournal()}
function jumpToday(){state.selectedDate=new Date(TODAY);renderJournal();toast('Back to today')}
function renderTimeline(){
  const p=pet(), d=state.selectedDate, e=entry(p.id,d)||{};
  const isToday=iso(d)===iso(TODAY);
  const rows=[];
  if(e.mood){
    const m=MOODS[e.mood.preset];
    rows.push({time:e.mood.at,html:`
      <div class="tl-top"><span class="t">Mood · ${m.label}</span><time>${e.mood.at}</time></div>
      <div class="tl-sub">${p.name} was feeling ${m.label.toLowerCase()}</div>
      ${e.mood.note?`<div class="tl-note">“${esc(e.mood.note)}”</div>`:''}`,
      ic:ICONS.smile,bg:'var(--sage-tint)',fg:'var(--sage-deep)'});
  }
  if(e.weight){
    rows.push({time:e.weight.at,html:`
      <div class="tl-top"><span class="t">Weight</span><time>${e.weight.at}</time></div>
      <div class="tl-sub">${e.weight.kg.toFixed(2).replace(/0$/,'')} kg recorded</div>`,
      ic:ICONS.scale,bg:'var(--viola-tint)',fg:'var(--viola-deep)'});
  }
  const given=e.given||{};
  petMeds(p.id).forEach(m=>{
    const g=given[m.id]||[];
    m.times.forEach((t,idx)=>{
      if(idx<g.length){
        rows.push({time:g[idx],html:`
          <div class="tl-top"><span class="t">${esc(m.name)} given</span><time>${g[idx]}</time></div>
          <div class="tl-sub">${m.dose}${m.unit==='tablet'?' tablet':m.unit}${m.notes?' · '+esc(m.notes):''}</div>`,
          ic:ICONS.pill,bg:'var(--honey-tint)',fg:'var(--honey-deep)'});
      }else if(isToday){
        rows.push({time:t,pending:true,html:`
          <div class="tl-top"><span class="t">${esc(m.name)}</span><span class="chip chip-honey">Due ${t}</span></div>
          <div class="tl-sub">${m.dose}${m.unit==='tablet'?' tablet':m.unit}${m.notes?' · '+esc(m.notes):''}</div>
          <button class="btn btn-primary tl-give" onclick="markGivenJournal('${m.id}')">Mark given</button>`,
          ic:ICONS.pill});
      }
    });
  });
  // archived meds given historically
  Object.entries(given).forEach(([mid,times])=>{
    const m=state.meds.find(x=>x.id===mid);
    if(!m||m.petId!==p.id||!m.archived)return;
    times.forEach(t=>rows.push({time:t,html:`
      <div class="tl-top"><span class="t">${esc(m.name)} given</span><time>${t}</time></div>
      <div class="tl-sub">${m.dose}${m.unit==='tablet'?' tablet':m.unit} · now archived</div>`,
      ic:ICONS.pill,bg:'var(--paper-deep)',fg:'var(--ink-3)'}));
  });
  rows.sort((a,b)=>a.time<b.time?-1:1);
  const tl=document.getElementById('timeline');
  if(!rows.length){
    tl.innerHTML=`<div class="empty">
      <div class="big">A quiet page in ${esc(p.name)}’s journal</div>
      <div class="s">Nothing logged on this day — use the buttons above to add an entry.</div>
    </div>`;
    return;
  }
  tl.innerHTML=rows.map(r=>`
    <div class="tl-entry ${r.pending?'pending':''}">
      <div class="tl-rail">
        <div class="tl-ic" style="${r.pending?'':'background:'+r.bg+';color:'+r.fg}">${r.ic}</div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-body">${r.html}</div>
    </div>`).join('');
}
function markGivenJournal(id){markGivenAt(id);renderTimeline();renderWeek()}
function markGivenAt(medId){
  const e=ensureEntry(state.activePet,state.selectedDate);
  e.given??={};(e.given[medId]??=[]).push(timeStr());
  toast(`${state.meds.find(x=>x.id===medId).name} marked as given`);
}

/* ————————————————————————— Sheets: mood / weight / med log ————————————————————————— */
let sheetMood=null;
function openSheet(id){
  document.getElementById('scrim').classList.add('show');
  document.getElementById(id).classList.add('show');
}
function closeSheets(){
  document.getElementById('scrim').classList.remove('show');
  document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('show'));
}
function openMoodSheet(){
  const p=pet(), e=entry(p.id,state.selectedDate);
  sheetMood=e&&e.mood?e.mood.preset:null;
  document.getElementById('mood-title').textContent=`How is ${p.name} ${relLabel(state.selectedDate)==='Today'?'today':'on this day'}?`;
  document.getElementById('mood-sub').textContent=fmtLong(state.selectedDate);
  document.getElementById('mood-note').value=e&&e.mood?e.mood.note:'';
  renderMoodGrid();
  openSheet('sheet-mood');
}
function renderMoodGrid(){
  document.getElementById('moodgrid').innerHTML=Object.entries(MOODS).reverse().map(([k,m])=>`
    <button class="moodopt ${sheetMood===k?'on':''}" onclick="pickMood('${k}')">
      <span class="swatch" style="background:${m.color}"></span>${m.label}
    </button>`).join('');
}
function pickMood(k){sheetMood=k;renderMoodGrid()}
function saveMood(){
  if(!sheetMood){toast('Choose a mood first');return}
  const e=ensureEntry(state.activePet,state.selectedDate);
  e.mood={preset:sheetMood,note:document.getElementById('mood-note').value.trim(),at:timeStr()};
  closeSheets();toast('Mood saved');
  renderJournal();
}
function openWeightSheet(){
  const p=pet(), e=entry(p.id,state.selectedDate);
  const last=weightSeries(p.id,365);
  document.getElementById('weight-title').textContent=`Log ${p.name}’s weight`;
  document.getElementById('weight-sub').textContent=fmtLong(state.selectedDate);
  document.getElementById('weight-input').value=e&&e.weight?e.weight.kg:(last.length?last[last.length-1].kg.toFixed(1):'');
  openSheet('sheet-weight');
}
function stepWeight(n){
  const i=document.getElementById('weight-input');
  i.value=(Math.max(0,(parseFloat(i.value)||0)+n)).toFixed(1);
}
function saveWeight(){
  const v=parseFloat(document.getElementById('weight-input').value);
  if(!(v>0)){toast('Enter a weight first');return}
  const e=ensureEntry(state.activePet,state.selectedDate);
  e.weight={kg:Math.round(v*100)/100,at:timeStr()};
  closeSheets();toast('Weight saved');
  renderJournal();
}
function openMedLogSheet(){
  document.getElementById('medlog-sub').textContent=`${pet().name} · ${fmtLong(state.selectedDate)}`;
  renderMedLogList();
  openSheet('sheet-medlog');
}
function renderMedLogList(){
  const p=pet(), e=entry(p.id,state.selectedDate)||{}, given=e.given||{};
  const meds=petMeds(p.id);
  const box=document.getElementById('medlog-list');
  if(!meds.length){
    box.innerHTML=`<div class="empty" style="padding:24px"><div class="big">No active medications</div><div class="s">Add one from Care → Medications.</div></div>`;
    return;
  }
  box.innerHTML=meds.map(m=>{
    const g=(given[m.id]||[]).length, total=m.times.length, done=g>=total;
    return `<button class="medlog-row ${done?'given':''}" onclick="toggleDose('${m.id}')">
      <span class="cb">${done?ICONS.check:''}</span>
      <span class="info">
        <span class="t" style="display:block">${esc(m.name)} · ${m.dose}${m.unit==='tablet'?' tablet':m.unit}</span>
        <span class="s" style="display:block">${g} of ${total} dose${total>1?'s':''} given · ${m.times.join(' · ')}</span>
      </span>
    </button>`;
  }).join('');
}
function toggleDose(id){
  const e=ensureEntry(state.activePet,state.selectedDate);
  e.given??={};const m=state.meds.find(x=>x.id===id);
  const g=e.given[id]||[];
  if(g.length>=m.times.length){e.given[id]=[]} else {(e.given[id]??=[]).push(timeStr())}
  renderMedLogList();renderTimeline();renderWeek();
}

/* ————————————————————————— CARE ————————————————————————— */

  document.getElementById('care-pets').innerHTML=state.pets.map(p=>{
    const active=p.id===state.activePet;
    const meds=petMeds(p.id).length;
    return `<div class="card petcard ${active?'':'inactive'}">
      <div class="toprow" ${active?'':`onclick="setActive('${p.id}')" role="button" tabindex="0"`}>
        <div class="avatar small">${p.name[0]}</div>
        <div style="flex:1">
          <div class="nm">${esc(p.name)}</div>
          <div class="mt">${esc(p.type)} · ${p.age} years${active?' · active':''}</div>
        </div>
        ${active?'<span class="chip chip-sage">Active</span>':'<span data-ic-x>'+ICONS.chev+'</span>'}
      </div>
      ${active?`
      <div class="tags">
        ${p.conditions.map(c=>`<span class="chip chip-neutral">${esc(c)}</span>`).join('')}
        ${meds?`<span class="chip chip-viola">${meds} medications</span>`:'<span class="chip chip-neutral">No medications</span>'}
      </div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="toast('Pet profile — coming soon')">Open profile</button>
        <button class="btn btn-quiet" onclick="toast('Edit pet — coming soon')">Edit</button>
      </div>`:''}
    </div>`;
  }).join('');
  const medCount=petMeds(state.activePet).length;
  document.getElementById('care-manage').innerHTML=`
    <button class="mrow" onclick="showScreen('meds')">
      <span class="ic" style="background:var(--honey-tint);color:var(--honey-deep)">${ICONS.pill}</span>
      <span class="info"><span class="t" style="display:block">Medications</span><span class="s" style="display:block">Schedules, doses and archive</span></span>
      ${medCount?`<span class="count">${medCount} active</span>`:''}
      ${ICONS.chev}
    </button>
    <button class="mrow" onclick="toast('Documents — coming soon')">
      <span class="ic" style="background:var(--viola-tint);color:var(--viola-deep)">${ICONS.doc}</span>
      <span class="info"><span class="t" style="display:block">Documents</span><span class="s" style="display:block">Reports, scans and vet files</span></span>
      ${ICONS.chev}
    </button>
    <button class="mrow" onclick="toast('Health report export — coming soon')">
      <span class="ic" style="background:var(--sage-tint);color:var(--sage-deep)">${ICONS.export}</span>
      <span class="info"><span class="t" style="display:block">Export health report</span><span class="s" style="display:block">Share a PDF with your vet</span></span>
      ${ICONS.chev}
    </button>`;
}
function setActive(id){state.activePet=id;renderCare();toast(`${pet().name} is now active`)}

/* ————————————————————————— MEDICATIONS ————————————————————————— */
document.getElementById('med-seg').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  state.medTab=b.dataset.tab;
  document.querySelectorAll('#med-seg button').forEach(x=>x.classList.toggle('on',x===b));
  renderMeds();
});
function renderMeds(){
  const list=state.meds.filter(m=>m.archived===(state.medTab==='archived'));
  const n=list.length;
  document.getElementById('med-count').textContent=
    state.medTab==='active'?`${n} active medication${n===1?'':'s'}`:`${n} archived medication${n===1?'':'s'}`;
  const box=document.getElementById('medlist');
  if(!n){
    box.innerHTML=`<div class="empty">
      <div class="big">${state.medTab==='active'?'No medications yet':'Nothing in the archive'}</div>
      <div class="s">${state.medTab==='active'?'Add the first schedule with the button below.':'Archived medications keep their full history.'}</div>
    </div>`;
    return;
  }
  box.innerHTML=list.map(m=>{
    const p=state.pets.find(x=>x.id===m.petId);
    return `<div class="card med ${m.archived?'archived':''}">
      <div class="pillbox">${ICONS.pill}</div>
      <div class="body">
        <div class="nm">${esc(m.name)}</div>
        <div class="ds">${m.dose}${m.unit==='tablet'?' tablet':' '+m.unit} per dose</div>
        <div class="chips">
          <span class="chip chip-viola">${esc(m.frequency)}</span>
          <span class="chip chip-neutral">${m.times.join(' · ')}</span>
        </div>
        <div class="foot">${esc(p?p.name:'')}${m.notes?` · ${esc(m.notes)}`:''}</div>
      </div>
      <div class="side">
        <button class="icon-btn" aria-label="Edit ${esc(m.name)}" onclick="openMedForm('${m.id}')">${ICONS.edit}</button>
        <button class="icon-btn" aria-label="${m.archived?'Restore':'Archive'} ${esc(m.name)}" onclick="toggleArchive('${m.id}')">${m.archived?ICONS.restore:ICONS.archive}</button>
      </div>
    </div>`;
  }).join('');
}
function toggleArchive(id){
  const m=state.meds.find(x=>x.id===id);
  m.archived=!m.archived;
  toast(m.archived?`${m.name} archived — history kept`:`${m.name} restored`);
  renderMeds();
}
function openMedForm(id){
  state.editingMed=id||null;
  const m=id?state.meds.find(x=>x.id===id):null;
  document.getElementById('medform-title').textContent=m?'Edit medication':'Add medication';
  document.getElementById('mf-save').textContent=m?'Save changes':'Add medication';
  document.getElementById('mf-name').value=m?m.name:'';
  document.getElementById('mf-dose').value=m?m.dose:'';
  document.getElementById('mf-unit').value=m?m.unit:'mg';
  document.getElementById('mf-freq').value=m?m.frequency:'Twice daily';
  document.getElementById('mf-t1').value=m?m.times[0]:'08:00';
  document.getElementById('mf-t2').value=m&&m.times[1]?m.times[1]:'20:00';
  const petSel=document.getElementById('mf-pet');
  petSel.innerHTML=state.pets.map(p=>`<option value="${p.id}" ${m&&m.petId===p.id||!m&&p.id===state.activePet?'selected':''}>${esc(p.name)}</option>`).join('');
  document.getElementById('mf-notes').value=m?m.notes:'';
  syncTime2();
  openSheet('sheet-medform');
}
function syncTime2(){
  const f=document.getElementById('mf-freq').value;
  document.getElementById('mf-t2').style.display=(f==='Twice daily'||f==='Three times daily')?'':'none';
}
document.getElementById('mf-freq').addEventListener('change',syncTime2);
function saveMedForm(){
  const name=document.getElementById('mf-name').value.trim();
  const dose=parseFloat(document.getElementById('mf-dose').value);
  if(!name||!(dose>0)){toast('Add a name and a dose first');return}
  const f=document.getElementById('mf-freq').value;
  const times=[document.getElementById('mf-t1').value];
  if(f==='Twice daily'||f==='Three times daily')times.push(document.getElementById('mf-t2').value);
  const data={name,dose,unit:document.getElementById('mf-unit').value,frequency:f,times,
    petId:document.getElementById('mf-pet').value,notes:document.getElementById('mf-notes').value.trim()};
  if(state.editingMed){
    Object.assign(state.meds.find(x=>x.id===state.editingMed),data);
    toast('Changes saved');
  }else{
    state.meds.push({id:'m'+Date.now(),archived:false,...data});
    toast(`${name} added`);
  }
  closeSheets();renderMeds();
}

/* ————————————————————————— Init ————————————————————————— */
renderToday();
</script>
</body>
</html>
